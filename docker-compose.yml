services:
  obsidian:
    image: ghcr.io/sytone/obsidian-remote:latest
    container_name: obsidianet
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:8080"   # HTTP  -> http://host:8080
      - "${HTTPS_PORT:-8443}:8443"  # HTTPS -> https://host:8443
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-Europe/Madrid}
      DOCKER_MODS: linuxserver/mods:universal-git
      # Login for the web UI (KasmVNC basic auth)
      CUSTOM_USER: ${OBSIDIAN_USER}
      PASSWORD: ${OBSIDIAN_PASSWORD}
      # KasmVNC display sizing
      KEYBOARD: en-us-qwerty
    volumes:
      - ./data/vaults:/vaults
      - ./data/config:/config
    # obsidian-remote needs a bit of shared memory for the browser/render
    shm_size: "1gb"
    security_opt:
      - seccomp:unconfined
