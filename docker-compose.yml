# Coolify-native compose. Single file — Coolify loads ONLY this one.
#
# Deploy fast:
#   1. Coolify → New Resource → Docker Compose (Public Repository) → this repo, branch main
#   2. Build Pack: Docker Compose | Location: /docker-compose.yml
#   3. Set the env vars below in Coolify → Environment Variables tab.
#   4. Deploy.
#
# Env vars to set in Coolify UI (Coolify injects them via --env-file):
#   DB_PASSWORD          (required)  openssl rand -hex 16
#   APP_SECRET           (required)  openssl rand -hex 32
#   ADMIN_JWT_SECRET     (required)  openssl rand -hex 32
#   ADMIN_PASSWORD       (required)  your admin login password
#   ADMIN_USER           (optional)  defaults to "admin"
#   APP_URL              (required)  public https URL of the notes app,
#                                    e.g. https://notes.tudominio.com
#
# Domains: set the public domain on the "docmost" (and "admin") service in
# Coolify's UI (Configuration → Domains). Coolify wires Traefik + HTTPS.
# No Caddy, no host ports. Old docker-compose.prod.yml + Caddyfile unused.

services:
  # ─────────────────────────── Docmost (notes app) ───────────────────────────
  docmost:
    image: obsidianet:latest
    build:
      context: .
      dockerfile: Dockerfile.rebrand
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_URL: "${APP_URL}"
      APP_SECRET: "${APP_SECRET}"
      DATABASE_URL: "postgresql://docmost:${DB_PASSWORD}@db:5432/docmost?schema=public"
      REDIS_URL: "redis://redis:6379"
    restart: unless-stopped
    volumes:
      - docmost_storage:/app/data/storage

  # ──────────────────── Admin panel (Notion-styled, login #2) ─────────────────
  admin:
    build: ./admin
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://docmost:${DB_PASSWORD}@db:5432/docmost"
      ADMIN_USER: "${ADMIN_USER:-admin}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD}"
      ADMIN_JWT_SECRET: "${ADMIN_JWT_SECRET}"
      DOCMOST_URL: "${APP_URL}"
      STORAGE_PATH: "/docmost-storage"
      COOKIE_SECURE: "${COOKIE_SECURE:-true}"
    restart: unless-stopped
    volumes:
      - docmost_storage:/docmost-storage:ro

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: docmost
      POSTGRES_USER: docmost
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "docmost", "-d", "docmost"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - redis_data:/data

volumes:
  docmost_storage:
  db_data:
  redis_data:
