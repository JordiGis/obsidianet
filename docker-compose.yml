services:
  # ─────────────────────────── Docmost (user app, login #1) ──────────────────
  docmost:
    image: docmost/docmost:latest
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_URL: "${APP_URL:-http://Mac-2.local:3000}"
      APP_SECRET: "${APP_SECRET}"
      DATABASE_URL: "postgresql://docmost:${DB_PASSWORD}@db:5432/docmost?schema=public"
      REDIS_URL: "redis://redis:6379"
    ports:
      - "${BIND_ADDR:-}${DOCMOST_PORT:-3000}:3000"
    restart: unless-stopped
    volumes:
      - docmost_storage:/app/data/storage

  # ──────────────────── Admin panel (Notion-styled, login #2) ─────────────────
  admin:
    build: ./admin
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://docmost:${DB_PASSWORD}@db:5432/docmost"
      ADMIN_USER: "${ADMIN_USER}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD}"
      ADMIN_JWT_SECRET: "${ADMIN_JWT_SECRET}"
      DOCMOST_URL: "${APP_URL:-http://Mac-2.local:3000}"
      STORAGE_PATH: "/docmost-storage"
      COOKIE_SECURE: "${COOKIE_SECURE:-false}"
    ports:
      - "${BIND_ADDR:-}${ADMIN_PORT:-8888}:3000"
    restart: unless-stopped
    volumes:
      - docmost_storage:/docmost-storage:ro

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: docmost
      POSTGRES_USER: docmost
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "docmost", "-d", "docmost"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - redis_data:/data

volumes:
  docmost_storage:
  db_data:
  redis_data:
